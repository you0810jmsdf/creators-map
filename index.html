  <title>千葉ニュータウン クリエイターズマップ</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    /* ===== リセット・基本 ===== */
    :root {
      --app-height: 100vh;
    }
    html {
      height: 100%;
      height: -webkit-fill-available;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: #f5f2ec;
      display: flex;
      flex-direction: column;
      min-height: var(--app-height);
      height: var(--app-height);
      overflow: hidden;
    }

    /* ===== ヘッダー ===== */
    .header {
      background: #1a1a2e;
      color: #fff;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 20px;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .header-title {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .header-title .sub  { font-size: 10px; color: #aaa; letter-spacing: 2px; text-transform: uppercase; }
    .header-title .main { font-size: 16px; font-weight: 700; line-height: 1.2; }

    /* クリエイター数カウント */
    .count-box {
      background: linear-gradient(135deg, #e67e22, #f39c12);
      border-radius: 12px;
      padding: 8px 18px;
      display: flex;
      align-items: baseline;
      gap: 5px;
      box-shadow: 0 2px 6px rgba(230,126,34,0.4);
    }
    .count-number {
      font-size: 2.8rem;
      font-weight: 900;
      line-height: 1;
      letter-spacing: -2px;
    }
    .count-unit { font-size: 12px; line-height: 1.3; }

    /* ===== 凡例バー ===== */
    .legend-bar {
      background: #fff;
      border-bottom: 1px solid #e0ddd6;
      padding: 8px 20px;
      display: flex;
      align-items: center;
      gap: 4px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    .legend-label { font-size: 10px; color: #999; margin-right: 6px; white-space: nowrap; }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: #444;
      background: #f8f8f8;
      padding: 3px 8px;
      border-radius: 20px;
      white-space: nowrap;
      cursor: pointer;
      border: 1.5px solid transparent;
      transition: border-color 0.15s;
    }
    .legend-item:hover { border-color: #ccc; }
    .legend-item.active { border-color: #555; background: #fff; }
    .legend-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* エリア凡例 */
    .area-legend {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-left: auto;
    }
    .area-legend-label { font-size: 10px; color: #999; }
    .area-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: #555;
    }
    .area-swatch {
      width: 22px; height: 12px;
      border-radius: 3px;
      border: 1.5px solid;
    }
    /* ===== 検索ボックス ===== */
    .search-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
    }
    .search-input {
      flex: 1;
      padding: 6px 10px;
      border: 1.5px solid #ddd;
      border-radius: 20px;
      font-size: 13px;
      font-family: 'Noto Sans JP', sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-input:focus { border-color: #1a237e; }
    .search-clear {
      cursor: pointer;
      color: #999;
      font-size: 18px;
      line-height: 1;
      padding: 0 4px;
      display: none;
    }

    .area-btn {
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 12px;
      border: 1.5px solid transparent;
      transition: background 0.15s;
    }
    .area-btn.active {
      background: #e8e8e8;
      border-color: #999;
      font-weight: bold;
    }
    .area-btn:hover {
      background: #f0f0f0;
    }

    /* ===== 切り替えボタン ===== */
    .view-toggle {
      display: flex;
      margin-left: auto;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      overflow: hidden;
    }
    .view-btn {
      padding: 5px 14px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      background: #f5f5f5;
      color: #888;
      border: none;
      transition: background 0.15s, color 0.15s;
      font-family: 'Noto Sans JP', sans-serif;
    }
    .view-btn.active {
      background: #1a1a2e;
      color: #fff;
    }

    /* ===== 地図エリア ===== */
    #map {
      flex: 1;
      width: 100%;
    }

    /* ===== リストビュー ===== */
    #list-view {
      flex: 1;
      overflow-y: auto;
      background: #f5f2ec;
      padding: 16px 20px;
      display: none;
    }
    .creator-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
    }
    .creator-card {
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .card-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 700;
      color: #fff;
      width: fit-content;
    }
    .card-name {
      font-size: 16px;
      font-weight: 700;
      color: #1a1a2e;
      line-height: 1.3;
    }
    .card-row {
      font-size: 12px;
      color: #555;
      line-height: 1.6;
    }
    .card-link {
      font-size: 12px;
      color: #2980b9;
      text-decoration: none;
      margin-top: 4px;
    }
    .card-link:hover { text-decoration: underline; }
    .list-empty {
      text-align: center;
      color: #aaa;
      padding: 60px 20px;
      font-size: 14px;
    }
    .new-badge {
      display: inline-block;
      background: #ff4757;
      color: #fff;
      font-size: 10px;
      font-weight: bold;
      padding: 2px 6px;
      border-radius: 4px;
      margin-left: 6px;
      vertical-align: middle;
      letter-spacing: 0.5px;
    }

    /* ===== スマホ対応 ===== */
    @media (max-width: 600px) {
      body {
        height: auto;
        min-height: var(--app-height);
        overflow-y: auto;
        display: block;
      }

      /* ヘッダーだけ固定 */
      .header {
        position: sticky;
        top: 0;
        z-index: 200;
        padding: 6px 10px;
        gap: 8px;
      }
      .header-title .main { font-size: 12px; }
      .header-title .sub  { display: none; }
      .count-number { font-size: 1.6rem; }
      .count-box { padding: 4px 10px; }

      /* フィルター・検索は通常フロー（スクロールで見える）*/
      .legend-bar { padding: 6px 10px; gap: 4px; flex-wrap: wrap; }
      .legend-item { font-size: 10px; padding: 2px 6px; }
      .area-legend { margin-left: 0; flex-wrap: wrap; gap: 4px; }
      .area-legend-label { display: none; }
      .search-bar { padding: 5px 10px; }
      .search-input { font-size: 12px; }

      /* マップ・リストは固定高さ */
      #map {
        height: 65vw;
        min-height: 280px;
        max-height: 420px;
      }
      #list-view {
        min-height: 50vh;
        overflow-y: auto;
        padding: 10px;
      }

      .view-btn { padding: 5px 10px; font-size: 11px; }
      .creator-grid { grid-template-columns: 1fr; gap: 10px; }
      .card-name { font-size: 14px; }
    }

    /* ===== 情報ウィンドウのスタイル ===== */
    .iw-wrap {
      font-family: 'Noto Sans JP', sans-serif;
      min-width: 200px;
      max-width: 240px;
      padding: 4px 2px 2px;
    }
    .iw-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 6px;
    }
    .iw-name {
      font-size: 15px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 5px;
      line-height: 1.3;
    }
    .iw-row {
      font-size: 11px;
      color: #555;
      margin-bottom: 3px;
      line-height: 1.5;
    }
    .iw-link {
      display: inline-block;
      margin-top: 6px;
      font-size: 11px;
      color: #2980b9;
      text-decoration: none;
    }
    .iw-link:hover { text-decoration: underline; }
  </style>
</head>

<!-- ヘッダー -->
<div class="header">
  <div class="header-title">
    <span class="sub">Chiba New Town</span>
    <span class="main">クリエイターズマップ</span>
  </div>
  <div class="count-box">

    <span class="count-unit">名の<br>クリエイター</span>
  </div>
</div>

<!-- 検索バー -->
<div class="search-bar">

  <span class="search-clear" id="search-clear" onclick="clearSearch()">✕</span>
</div>

<!-- 凡例バー -->
<div class="legend-bar">

      <div class="area-swatch" style="background:#FFF59D88; border-color:#F9A825;"></div>印西市
    </div>
    <div class="area-item area-btn" id="area-btn-白井市" onclick="setAreaFilter('白井市')">
      <div class="area-swatch" style="background:#B2EBF288; border-color:#00838F;"></div>白井市

    <div class="area-item area-btn" id="area-btn-栄町" onclick="setAreaFilter('栄町')">
      <div class="area-swatch" style="background:#F8BBD088; border-color:#C2185B;"></div>栄町
    </div>
  </div>

  <!-- 切り替えボタン -->
  <div class="view-toggle">
    <button class="view-btn active" id="btn-map" onclick="switchView('map')">🗺 マップ</button>
    <button class="view-btn" id="btn-list" onclick="switchView('list')">📋 リスト</button>
  </div>
</div>

<!-- 地図 -->
<div id="map"></div>

<!-- リストビュー -->
<div id="list-view">
  <div class="creator-grid" id="creator-grid"></div>
</div>

let map;
let allMarkers = [];
// 表示するカテゴリの集合（初期=全カテゴリON）
const ALL_CATEGORIES = ['革・レザー','布・糸・手芸','陶・木・金属','ファブ・デジタル工作',
                        '食・農・発酵','絵・デザイン','映像・写真','IT・Web','その他・複合'];
let activeFilters = new Set(ALL_CATEGORIES);
let allCreators  = []; // リスト表示用に保持
let currentView  = 'map';

function updateViewportHeight() {
  const viewport = window.visualViewport;
  const height = viewport ? viewport.height : window.innerHeight;
  document.documentElement.style.setProperty('--app-height', height + 'px');
}

function scheduleMapResize() {
  if (!map || typeof google === 'undefined' || !google.maps) return;
  window.setTimeout(function() {
    google.maps.event.trigger(map, 'resize');
    const center = map.getCenter();
    if (center) map.setCenter(center);
  }, 100);
}

updateViewportHeight();
window.addEventListener('resize', updateViewportHeight, { passive: true });
window.addEventListener('orientationchange', updateViewportHeight, { passive: true });
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', updateViewportHeight, { passive: true });
}

// ===== 地図初期化 =====
function initMap() {
  map = new google.maps.Map(document.getElementById('map'), {
    center     : { lat: 35.785, lng: 140.150 },
    zoom       : 12,
    mapTypeId  : 'roadmap',
    mapTypeControl       : false,
    streetViewControl    : false,
    fullscreenControl    : true,
    gestureHandling      : 'greedy',
    styles: [
      { featureType: 'poi',     stylers: [{ visibility: 'off' }] },
      { featureType: 'transit', stylers: [{ visibility: 'simplified' }] },
    ]
  });

  drawCityAreas();
  buildLegend();
  loadCreators();
  scheduleMapResize();
}

// ===== 市区町村エリア描画 =====
function drawCityAreas() {
  CITY_POLYGONS.forEach(function(city) {
    new google.maps.Polygon({
      paths        : city.coords,
      strokeColor  : city.strokeColor,
      strokeOpacity: 0.9,
      strokeWeight : 2,
      fillColor    : city.fillColor,
      fillOpacity  : 0.32,
      map          : map,
    });
  });
}

// ===== 凡例ボタン生成 =====
function buildLegend() {
  const container = document.getElementById('legend-items');
  container.style.display = 'flex';
  container.style.gap = '4px';
  container.style.flexWrap = 'wrap';

  Object.entries(CATEGORIES).forEach(function([name, conf]) {
    const btn = document.createElement('div');
    btn.className = 'legend-item active';
    btn.dataset.category = name;
    btn.innerHTML = `
      <span class="legend-dot" style="background:${conf.color}"></span>
      ${conf.emoji} ${name}
    `;
    btn.addEventListener('click', function() { toggleFilter(name, btn); });
    container.appendChild(btn);
  });
}

// カテゴリ名を9分野に正規化（不一致はその他・複合に）
function normalizeCategory(cat) {
  return ALL_CATEGORIES.includes(cat) ? cat : 'その他・複合';
}

function toggleFilter(category, btn) {
  if (activeFilters.has(category)) {
    activeFilters.delete(category);   // ONだったのでOFF（非表示に）
    btn.classList.remove('active');
  } else {
    activeFilters.add(category);      // OFFだったのでON（表示に）
    btn.classList.add('active');
  }
  applyFilter();
  if (currentView === 'list') buildCreatorList();
}

function applyFilter() {
  allCreators.forEach(function(c, i) {
    const item = allMarkers[i];
    if (!item) return;
    const cat        = normalizeCategory(c.category);
    const categoryOk = activeFilters.has(cat);          // 集合に含まれていれば表示
    const areaOk     = !activeAreaFilter || c.city === activeAreaFilter;
    const searchOk   = matchesSearch(c);
    item.marker.setVisible(categoryOk && areaOk && searchOk);
  });
}

// ===== ビュー切り替え =====
function switchView(view) {
  currentView = view;
  document.getElementById('map').style.display       = view === 'map'  ? 'block' : 'none';
  document.getElementById('list-view').style.display = view === 'list' ? 'flex'  : 'none';
  document.getElementById('btn-map').classList.toggle('active',  view === 'map');
  document.getElementById('btn-list').classList.toggle('active', view === 'list');
  if (view === 'map') scheduleMapResize();
  if (view === 'list') buildCreatorList();
}

// ===== キーワード検索 =====
let searchKeyword = '';

function onSearchInput(val) {
  searchKeyword = val.trim().toLowerCase();
  document.getElementById('search-clear').style.display = val ? 'block' : 'none';
  applyFilter();
  if (currentView === 'list') buildCreatorList();
}

function clearSearch() {
  searchKeyword = '';
  document.getElementById('search-input').value = '';
  document.getElementById('search-clear').style.display = 'none';
  applyFilter();
  if (currentView === 'list') buildCreatorList();
}

function matchesSearch(c) {
  if (!searchKeyword) return true;
  return [c.name, c.works, c.description, c.category]
    .some(v => v && v.toLowerCase().includes(searchKeyword));
}

// ===== エリアフィルター =====
function setAreaFilter(city) {
  activeAreaFilter = city;
  // ボタンのアクティブ状態を更新
  ['', '印西市', '白井市', '栄町'].forEach(function(c) {
    const id = 'area-btn-' + (c || 'all');
    const el = document.getElementById(id);
    if (el) el.classList.toggle('active', c === city);
  });
  applyFilter();                                  // マップのピンを絞り込み
  if (currentView === 'list') buildCreatorList(); // リストも絞り込み
}

// ===== リスト生成 =====
function buildCreatorList() {
  const grid = document.getElementById('creator-grid');
  let filtered = allCreators.filter(c => activeFilters.has(normalizeCategory(c.category)));
  if (activeAreaFilter) filtered = filtered.filter(c => c.city === activeAreaFilter);
  if (searchKeyword)    filtered = filtered.filter(c => matchesSearch(c));

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="list-empty">表示できるクリエイターがいません</div>';
    return;
  }
  grid.innerHTML = filtered.map(function(c, i) {
    const markerIndex = allCreators.indexOf(c);
    const conf    = CATEGORIES[c.category] || CATEGORIES['その他・複合'];
    const isNew   = c.isNew;
    const urlHtml = c.url
      ? `<a class="card-link" href="${c.url}" target="_blank" onclick="event.stopPropagation()">🔗 詳細を見る</a>`
      : '';
    return `
      <div class="creator-card" onclick="jumpToMap(${markerIndex})" style="cursor:pointer;" title="地図で見る">
        <span class="card-badge" style="background:${conf.color}">${conf.emoji} ${c.category}</span>
        ${isNew ? '<span class="new-badge">NEW</span>' : ''}
        <div class="card-name">${c.name}</div>
        ${c.works       ? `<div class="card-row">🎨 <b>代表作：</b>${c.works}</div>`  : ''}
        ${c.description ? `<div class="card-row">💬 ${c.description}</div>`           : ''}
        ${urlHtml}
      </div>`;
  }).join('');
}

// ===== リストカード→マップジャンプ =====
function jumpToMap(markerIndex) {
  switchView('map');
  const item = allMarkers[markerIndex];
  if (!item) return;
  map.panTo(item.marker.getPosition());
  map.setZoom(14);
  allMarkers.forEach(m => m.infoWindow.close());
  item.infoWindow.open(map, item.marker);
}

// ===== クリエイターデータ読み込み（Safari対応・fetch方式）=====
function loadCreators() {
  // Apps Script JSON エンドポイントからデータ取得（GitHub Pages / Safari 対応）
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbzR2b5gTAWEzWQIG31OLNvMjnHjo5r7UfQLkHwHaMfjtZYJ9bKtilMzU5J85GpKOFWb/exec';
  const jsonUrl = GAS_URL + '?mode=json';
  fetch(jsonUrl)
    .then(function(res) {
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return res.json();
    })
    .then(function(creators) {
      allCreators = creators;
      document.getElementById('count').textContent = creators.length;
      creators.forEach(addCreatorPin);
      if (currentView === 'list') buildCreatorList();
    })
    .catch(function(err) {
      // fetchが失敗した場合はgoogle.script.runにフォールバック
      console.warn('fetch失敗、google.script.runにフォールバック:', err);
      if (typeof google !== 'undefined' && google.script) {
        google.script.run
          .withSuccessHandler(function(creators) {
            allCreators = creators;
            document.getElementById('count').textContent = creators.length;
            creators.forEach(addCreatorPin);
            if (currentView === 'list') buildCreatorList();
          })
          .withFailureHandler(function(e) {
            document.getElementById('count').textContent = '–';
            console.error('データ取得エラー:', e);
          })
          .getCreators();
      } else {
        document.getElementById('count').textContent = '–';
      }
    });
}

// ===== ピン追加 =====
function addCreatorPin(creator) {
  const conf  = CATEGORIES[creator.category] || CATEGORIES['その他・複合'];
  const color = conf.color;

  const marker = new google.maps.Marker({
    position : { lat: creator.lat, lng: creator.lng },
    map      : map,
    title    : creator.name,
    icon: {
      path        : google.maps.SymbolPath.CIRCLE,
      scale       : 11,
      fillColor   : color,
      fillOpacity : 1,
      strokeColor : '#ffffff',
      strokeWeight: 2.5,
    },
    zIndex: 10,
  });

  const infoWindow = new google.maps.InfoWindow({
    content: buildInfoWindowContent(creator, color, conf.emoji),
  });

  marker.addListener('click', function() {
    infoWindow.open(map, marker);
  });

  allMarkers.push({ marker: marker, category: creator.category, city: creator.city, infoWindow: infoWindow });
}

// ===== 吹き出しのHTML =====
function buildInfoWindowContent(creator, color, emoji) {
  const urlHtml = creator.url
    ? `<a class="iw-link" href="${creator.url}" target="_blank">🔗 詳細を見る</a>`
    : '';
  return `
    <div class="iw-wrap">
      <span class="iw-badge" style="background:${color}">${emoji} ${creator.category}</span>
      <div class="iw-name">${creator.name}</div>
      ${creator.works       ? `<div class="iw-row">🎨 <b>代表作：</b>${creator.works}</div>`       : ''}
      ${creator.description ? `<div class="iw-row">💬 ${creator.description}</div>` : ''}
      ${urlHtml}
    </div>
  `;
}
