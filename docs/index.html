<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>千葉ニュータウン クリエイターズマップ</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  >
  <style>
    :root {
      --bg: #f3efe7;
      --panel: rgba(255, 255, 255, 0.94);
      --line: #d8d4ca;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #1d4ed8;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top right, rgba(244, 194, 132, 0.35), transparent 24%),
        linear-gradient(180deg, #fbfaf7 0%, var(--bg) 100%);
    }

    .shell {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .hero {
      padding: 24px 20px 14px;
    }

    .hero-card {
      display: flex;
      gap: 16px;
      align-items: center;
      justify-content: space-between;
      padding: 18px 20px;
      background: #182033;
      color: #fff;
      border-radius: 22px;
      box-shadow: var(--shadow);
    }

    .hero-copy {
      min-width: 0;
    }

    .hero-copy small {
      display: block;
      margin-bottom: 6px;
      letter-spacing: 0.14em;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.72);
    }

    .hero-copy h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.2;
    }

    .hero-count {
      flex-shrink: 0;
      min-width: 132px;
      padding: 14px 16px;
      border-radius: 18px;
      text-align: center;
      background: linear-gradient(135deg, #eb7d2a, #f0b23d);
    }

    .hero-count strong {
      display: block;
      font-size: 40px;
      line-height: 1;
    }

    .hero-count span {
      display: block;
      margin-top: 4px;
      font-size: 12px;
    }

    .controls {
      display: grid;
      gap: 12px;
      padding: 0 20px 18px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.75);
      border-radius: 18px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      backdrop-filter: blur(18px);
    }

    .toolbar {
      display: flex;
      gap: 12px;
      padding: 14px;
      align-items: center;
      flex-wrap: wrap;
    }

    .search {
      flex: 1 1 240px;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 12px 16px;
      font-size: 14px;
      background: #fff;
    }

    .toggle {
      display: inline-flex;
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      background: #fff;
    }

    .toggle button {
      border: 0;
      padding: 11px 16px;
      background: transparent;
      font-size: 13px;
      cursor: pointer;
      color: var(--muted);
    }

    .toggle button.active {
      background: var(--accent);
      color: #fff;
      font-weight: 700;
    }

    .filters {
      padding: 0 14px 14px;
      display: grid;
      gap: 12px;
    }

    .filter-row {
      display: grid;
      gap: 8px;
    }

    .filter-row label {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
    }

    .chip-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 12px;
      background: #fff;
      cursor: pointer;
      font-size: 13px;
      color: var(--text);
    }

    .chip.active {
      border-color: var(--accent);
      background: #e7efff;
      color: var(--accent);
      font-weight: 700;
    }

    .content {
      flex: 1;
      min-height: 0;
      padding: 0 20px 20px;
    }

    .viewport {
      height: calc(100vh - 284px);
      min-height: 480px;
      overflow: hidden;
    }

    #map-view,
    #list-view {
      height: 100%;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    #list-view {
      display: none;
      overflow: auto;
      padding: 14px;
    }

    .list-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px;
    }

    .card {
      padding: 16px;
      border-radius: 18px;
      background: #fff;
      border: 1px solid #ebe6dc;
      box-shadow: 0 6px 20px rgba(15, 23, 42, 0.06);
      cursor: pointer;
    }

    .card h2 {
      margin: 10px 0 6px;
      font-size: 18px;
      line-height: 1.35;
    }

    .badge-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 5px 10px;
      border-radius: 999px;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
    }

    .badge-new {
      display: inline-flex;
      align-items: center;
      padding: 5px 10px;
      border-radius: 999px;
      background: #e63946;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
    }

    .meta {
      margin-top: 8px;
      font-size: 13px;
      line-height: 1.65;
      color: #475569;
      word-break: break-word;
    }

    .meta a {
      color: var(--accent);
      text-decoration: none;
    }

    .state {
      padding: 24px;
      text-align: center;
      color: var(--muted);
      font-size: 15px;
    }

    .leaflet-popup-content {
      min-width: 220px;
      line-height: 1.6;
      font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
    }

    .popup-title {
      margin: 10px 0 6px;
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
    }

    .popup-line {
      margin-top: 6px;
      font-size: 13px;
      color: #475569;
      word-break: break-word;
    }

    @media (max-width: 720px) {
      .hero-card {
        flex-direction: column;
        align-items: flex-start;
      }

      .hero-count {
        min-width: 0;
        width: 100%;
      }

      .content,
      .controls,
      .hero {
        padding-left: 14px;
        padding-right: 14px;
      }

      .viewport {
        height: auto;
        min-height: 0;
      }

      #map-view {
        height: 56vh;
        min-height: 360px;
      }

      #list-view {
        min-height: 40vh;
      }

      .list-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="hero">
      <div class="hero-card">
        <div class="hero-copy">
          <small>CHIBA NEW TOWN</small>
          <h1>クリエイターズマップ</h1>
        </div>
        <div class="hero-count">
          <strong id="count">-</strong>
          <span>掲載クリエイター</span>
        </div>
      </div>
    </header>

    <section class="controls">
      <div class="panel toolbar">
        <input id="search-input" class="search" type="search" placeholder="屋号・代表作・一言紹介で検索">
        <div class="toggle">
          <button id="show-map" class="active" type="button">地図</button>
          <button id="show-list" type="button">一覧</button>
        </div>
      </div>

      <div class="panel filters">
        <div class="filter-row">
          <label>エリア</label>
          <div id="area-filters" class="chip-list"></div>
        </div>
        <div class="filter-row">
          <label>分野</label>
          <div id="category-filters" class="chip-list"></div>
        </div>
      </div>
    </section>

    <main class="content">
      <div class="panel viewport">
        <div id="map-view">
          <div id="map"></div>
        </div>
        <div id="list-view">
          <div id="status" class="state">データを読み込み中です。</div>
          <div id="list-grid" class="list-grid"></div>
        </div>
      </div>
    </main>
  </div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script>
    const DATA_URL = 'https://script.google.com/macros/s/AKfycbzR2b5gTAWEzWQIG31OLNvMjnHjo5r7UfQLkHwHaMfjtZYJ9bKtilMzU5J85GpKOFWb/exec?mode=json&callback=window.__creatorsMapData';
    const CATEGORY_STYLES = {
      '革・レザー': { color: '#8a5a44' },
      '布・糸・手芸': { color: '#d94677' },
      '陶・木・金属': { color: '#b7791f' },
      'ファブ・デジタル工作': { color: '#556f86' },
      '食・農・発酵': { color: '#2f9e44' },
      '絵・デザイン': { color: '#dc2626' },
      '映像・写真': { color: '#7c3aed' },
      'IT・Web': { color: '#2563eb' },
      'その他・複合': { color: '#6b7280' }
    };
    const AREA_ORDER = ['', '印西市', '白井市', '栄町', 'その他'];
    const DEFAULT_CENTER = [35.79, 140.12];
    const DEFAULT_ZOOM = 11;
    const FOCUS_CITIES = new Set(['印西市', '白井市', '栄町']);

    const state = {
      creators: [],
      filtered: [],
      area: '',
      keyword: '',
      activeCategories: new Set(Object.keys(CATEGORY_STYLES)),
      currentView: 'map',
      map: null,
      layerGroup: null
    };

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function styleForCategory(category) {
      return CATEGORY_STYLES[normalizeCategory(category)] || CATEGORY_STYLES['その他・複合'];
    }

    function normalizeCategory(category) {
      return CATEGORY_STYLES[category] ? category : 'その他・複合';
    }

    function setStatus(message) {
      document.getElementById('status').textContent = message;
    }

    function initMap() {
      state.map = L.map('map', {
        zoomControl: true,
        scrollWheelZoom: true
      }).setView(DEFAULT_CENTER, DEFAULT_ZOOM);

      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
      }).addTo(state.map);

      state.layerGroup = L.layerGroup().addTo(state.map);
    }

    function buildFilterChips() {
      const areaRoot = document.getElementById('area-filters');
      const categoryRoot = document.getElementById('category-filters');
      areaRoot.innerHTML = '';
      categoryRoot.innerHTML = '';

      AREA_ORDER.forEach(function(area) {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'chip' + (area === state.area ? ' active' : '');
        button.textContent = area || 'すべて';
        button.addEventListener('click', function() {
          state.area = area;
          buildFilterChips();
          applyFilters();
        });
        areaRoot.appendChild(button);
      });

      Object.keys(CATEGORY_STYLES).forEach(function(category) {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'chip' + (state.activeCategories.has(category) ? ' active' : '');
        button.textContent = category;
        button.addEventListener('click', function() {
          if (state.activeCategories.has(category)) {
            state.activeCategories.delete(category);
          } else {
            state.activeCategories.add(category);
          }
          buildFilterChips();
          applyFilters();
        });
        categoryRoot.appendChild(button);
      });
    }

    function popupHtml(creator) {
      const category = normalizeCategory(creator.category || 'その他・複合');
      const color = styleForCategory(category).color;
      const lines = [];
      if (creator.works) lines.push('<div class="popup-line"><strong>代表作:</strong> ' + escapeHtml(creator.works) + '</div>');
      if (creator.description) lines.push('<div class="popup-line">' + escapeHtml(creator.description) + '</div>');
      if (creator.city) lines.push('<div class="popup-line"><strong>エリア:</strong> ' + escapeHtml(creator.city) + '</div>');
      if (creator.url) lines.push('<div class="popup-line"><a href="' + escapeHtml(creator.url) + '" target="_blank" rel="noopener noreferrer">詳細を見る</a></div>');

      return '' +
        '<span class="badge" style="background:' + color + ';">' + escapeHtml(category) + '</span>' +
        '<div class="popup-title">' + escapeHtml(creator.name) + '</div>' +
        lines.join('');
    }

    function renderMap(items) {
      state.layerGroup.clearLayers();

      if (!items.length) {
        state.map.setView(DEFAULT_CENTER, DEFAULT_ZOOM);
        return;
      }

      const bounds = [];
      items.forEach(function(creator, index) {
        const lat = Number(creator.lat);
        const lng = Number(creator.lng);
        if (!Number.isFinite(lat) || !Number.isFinite(lng)) return;

        const marker = L.circleMarker([lat, lng], {
          radius: 8,
          fillColor: styleForCategory(creator.category).color,
          fillOpacity: 0.92,
          color: '#ffffff',
          weight: 2
        });

        marker.bindPopup(popupHtml(creator));
        marker.on('click', function() {
          state.currentView = 'map';
          syncViewButtons();
        });
        marker.addTo(state.layerGroup);
        creator.__markerIndex = index;
        if (FOCUS_CITIES.has(creator.city)) {
          bounds.push([lat, lng]);
        }
      });

      if (bounds.length) {
        state.map.fitBounds(bounds, { padding: [36, 36], maxZoom: 12 });
      } else {
        state.map.setView(DEFAULT_CENTER, DEFAULT_ZOOM);
      }
    }

    function renderList(items) {
      const grid = document.getElementById('list-grid');
      grid.innerHTML = '';

      if (!items.length) {
        setStatus('条件に合うクリエイターが見つかりません。');
        return;
      }

      setStatus('');

      items.forEach(function(creator) {
        const category = normalizeCategory(creator.category || 'その他・複合');
        const color = styleForCategory(category).color;
        const card = document.createElement('article');
        card.className = 'card';
        card.innerHTML =
          '<div class="badge-row">' +
            '<span class="badge" style="background:' + color + ';">' + escapeHtml(category) + '</span>' +
            (creator.isNew ? '<span class="badge-new">NEW</span>' : '') +
          '</div>' +
          '<h2>' + escapeHtml(creator.name) + '</h2>' +
          (creator.works ? '<div class="meta"><strong>代表作:</strong> ' + escapeHtml(creator.works) + '</div>' : '') +
          (creator.description ? '<div class="meta">' + escapeHtml(creator.description) + '</div>' : '') +
          (creator.city ? '<div class="meta"><strong>エリア:</strong> ' + escapeHtml(creator.city) + '</div>' : '') +
          (creator.url ? '<div class="meta"><a href="' + escapeHtml(creator.url) + '" target="_blank" rel="noopener noreferrer">詳細を見る</a></div>' : '');

        card.addEventListener('click', function() {
          state.currentView = 'map';
          syncViewButtons();
          document.getElementById('map-view').style.display = 'block';
          document.getElementById('list-view').style.display = 'none';
          state.map.setView([Number(creator.lat), Number(creator.lng)], 14);
        });

        grid.appendChild(card);
      });
    }

    function matchesCreator(creator) {
      const category = normalizeCategory(creator.category || 'その他・複合');
      const areaOk = !state.area || creator.city === state.area;
      const categoryOk = state.activeCategories.has(category);
      const keyword = state.keyword;
      const haystack = [
        creator.name,
        creator.works,
        creator.description,
        creator.city,
        category
      ].join(' ').toLowerCase();
      const keywordOk = !keyword || haystack.includes(keyword);
      return areaOk && categoryOk && keywordOk;
    }

    function applyFilters() {
      state.filtered = state.creators.filter(matchesCreator);
      document.getElementById('count').textContent = String(state.filtered.length);
      renderMap(state.filtered);
      renderList(state.filtered);
    }

    function syncViewButtons() {
      const mapView = state.currentView === 'map';
      document.getElementById('show-map').classList.toggle('active', mapView);
      document.getElementById('show-list').classList.toggle('active', !mapView);
      document.getElementById('map-view').style.display = mapView ? 'block' : 'none';
      document.getElementById('list-view').style.display = mapView ? 'none' : 'block';
      if (mapView) {
        window.setTimeout(function() {
          state.map.invalidateSize();
        }, 120);
      }
    }

    function handleCreators(payload) {
      state.creators = Array.isArray(payload) ? payload : [];
      document.getElementById('count').textContent = String(state.creators.length);
      buildFilterChips();
      applyFilters();
    }

    function loadData() {
      setStatus('データを読み込み中です。');
      window.__creatorsMapData = function(payload) {
        handleCreators(payload);
      };

      const script = document.createElement('script');
      script.src = DATA_URL + '&_=' + Date.now();
      script.async = true;
      script.onerror = function() {
        setStatus('データ取得に失敗しました。Apps Script 側の JSONP 対応を確認してください。');
      };
      document.body.appendChild(script);
    }

    document.getElementById('search-input').addEventListener('input', function(event) {
      state.keyword = event.target.value.trim().toLowerCase();
      applyFilters();
    });

    document.getElementById('show-map').addEventListener('click', function() {
      state.currentView = 'map';
      syncViewButtons();
    });

    document.getElementById('show-list').addEventListener('click', function() {
      state.currentView = 'list';
      syncViewButtons();
    });

    initMap();
    buildFilterChips();
    loadData();
  </script>
</body>
</html>
